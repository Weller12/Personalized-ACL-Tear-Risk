<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background-color: #f2f2f2;}
    .container {
        max-width: 600px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        position: relative;
        border: 20px solid rgb(23, 61, 131);
        backdrop-filter: blur(2px);}
    .checkbox-group {
        margin-top: 20px;}
    #risk {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        display: none;
        text-align: center;
    }

    h1 {
        font-size: 40px;
        text-align: center;
        margin-bottom: 10px;
        color: rgb(58, 80, 106)}
    h2 {
        font-size: 15px;
        margin-top: 20px;
        color: rgb(0, 0, 0)}
    button {
        text-align: center;
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #4caf4f;
        color: white;
        border: none;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;}
    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.2);}
</style>
    

<body>

    <div class="container">
        <div id="shape1" class="shape"></div>
        <div id="shape2" class="shape"></div>

        <h1>Personalized ACL tear risk</h1>
    <h2>What is your gender?</h2>
    <select id="sex">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>
    <h2>What sport do you play?</h2>
    <select id="sport">
        <option value="non-cutting sport">Non-cutting sport (Swimming, Track, etc.)</option>
        <option value="soccer">Soccer</option>
        <option value="basketball">Basketball</option>
        <option value="lacrosse">Lacrosse</option>
        <option value="handball">Handball</option>
        <option value="other cutting sport">Other cutting sport (Football, volleyball, etc.)</option>
    </select>
    <h2>What is your injury history?</h2>
    <select id="injury history">
        <option value="no past injury">No past injury</option>
        <option value="ACL tear in the past 12 months">ACL tear in the past 12 months</option>
        <option value="ACL tear more than 12 months ago">ACL tear more than 12 months ago</option>
        <option value="Past lower limb surgery (Non-ACL)">Past lower limb surgery (Non-ACL)</option>
    </select>
    <h2>What type of floor surface do you practice/play on?</h2>
    <select id="floor surface">
        <option value="Natural grass">Natural grass</option>
        <option value="Artificial turf">Artificial turf</option>
        <option value="artifical floor">Artificial floor (e.g., hard court, gym floor)</option>
        <option value="wooden floor">Wooden floor (e.g., hardwood, parquet)</option>
        
    </select>
    <h2> Check all that apply:</h2>
        <div class="checkbox-group">
        <input type="checkbox" id="family">
        <label for="family">First-degree relative (parent/sibling) has torn their ACL</label>
    </div>
    
    <div class="checkbox-group">
        <input type="checkbox" id="climate">
        <label for="climate">I live in a dry/low-rainfall climate</label>
    </div>
    
    <div class="checkbox-group">
        <input type="checkbox" id="age">
        <label for="age">I am under 20 years old and have previously torn my ACL</label>
    </div>
    
    <div class="checkbox-group">
        <input type="checkbox" id="shoes">
        <label for="shoes">I wear cleats or shoes with studs</label>
    </div>

    <div style="text-align:center">
        <button onclick="calculateRisk()">Update Risk Analysis</button>
    </div>
    <div id = "risk">1.0</div>
    </div> <!-- /.container -->

</body>

<script>
    function calculateRisk() {
    const sex = document.getElementById('sex').value;
    const sport = document.getElementById('sport').value;
    const injuryHistory = document.getElementById('injury history').value;
    const floorSurface = document.getElementById('floor surface').value;
    const family = document.getElementById('family').checked;
    const climate = document.getElementById('climate').checked;
    const age = document.getElementById('age').checked;
    const shoes = document.getElementById('shoes').checked;
    let score = 1.0;
    if (sex === 'female' && sport === 'basketball') {
        score *= 24.78;}
    if (sex === 'female' && sport === 'soccer') {
        score *= 18.9036;}
    if (sex === 'female' && sport === 'lacrosse') {
        score *= 8.3544;}
    if (sex === 'female' && sport === 'handball') {
        score *= 22.7268;}
    if (sex === 'female' && sport === 'non-cutting sport') {
        score *= 2.64;}
    if (sex === 'female' && sport === 'other cutting sport') {
        score *= 18.6912;}

    if (injuryHistory === 'ACL tear in the past 12 months') {
        score *= 11.33;}
    if (injuryHistory === 'ACL tear more than 12 months ago') {
        score *= 4.44;}
    if (injuryHistory === 'Past lower limb surgery (Non-ACL)') {
        score *= 3.65;}

    if (floorSurface === 'Natural grass') {
        score *= 1.26;}
    if (floorSurface === 'artificial floor') {
        score *= 2.35;}

    if (family) {
        score *= 2.24;}
    if (climate) {
        score *= 2.87;}
    if (age) {
        score *= 3.71;}
    if (shoes) {
        score *= 2.57;}
    document.getElementById('risk').innerText = Math.round(score) + "x";
    document.getElementById('risk').style.display = 'block';
    if (score >= 50.0) {
        const highRiskMessage = document.createElement('h2');
        highRiskMessage.style.color = 'red';
        highRiskMessage.style.textAlign = 'center';
        highRiskMessage.innerText = "High Risk";
        document.getElementById('risk').appendChild(highRiskMessage);}
    if (score > 10.0 && score < 50.0) {
        const moderateRiskMessage = document.createElement('h2');
        moderateRiskMessage.style.color = 'orange';
        moderateRiskMessage.style.textAlign = 'center';
        moderateRiskMessage.innerText = "Moderate Risk";
        document.getElementById('risk').appendChild(moderateRiskMessage);}
    if (score <= 10.0) {
        const lowRiskMessage = document.createElement('h2');
        lowRiskMessage.style.color = 'green';
        lowRiskMessage.style.textAlign = 'center';
        lowRiskMessage.innerText = "Low Risk";
        document.getElementById('risk').appendChild(lowRiskMessage);}
    }

</script>
